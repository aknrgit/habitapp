<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
</head>
<body>
    <h1>習慣編集画面</h1>
<form action="/habits/update" method="post">

    <!-- 今の値を表示＋編集 -->
    <input type="text" name="task" th:value="${task}">

    <!-- indexを隠して送る -->
    <input type="hidden" name="index" th:value="${index}">

    <button type="submit">更新</button>

</form>
</body>

</html>
