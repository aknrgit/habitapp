<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
</head>
<body>
    <h1>習慣一覧</h1>

<form action="/habits" method="post">
    <input type="text" name="title" placeholder="習慣名">
    <input type="text" name="description" placeholder="説明">
    <button type="submit">追加</button>
</form>

<ul>
    <li th:each="task, status : ${habits}">
        <span th:text="${task.title}"></span>
        <span th:text="${task.description}"></span>
<!--         <a th:href="@{/habits/delete(index=${status.index})}">削除</a>
        <a th:href="@{/habits/edit(index=${status.index})}">編集</a> -->
    </li>
</ul>
</body>

</html>
